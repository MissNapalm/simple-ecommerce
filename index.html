<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopCenter</title>
    <link rel="stylesheet" href="src/css/styles.css">
</head>
<body>

    <!-- Top bar -->
    <div id="top-bar">
        <img id="logo" src="logo.avif" alt="ShopCenter">
        <div id="search-wrapper">
            <input type="text" id="search" placeholder="Search for products...">
            <button id="hi-world-btn">Go</button>
        </div>
        <div id="top-bar-right">
            <a href="cart.html">🛒 Cart</a>
        </div>
    </div>

    <!-- Navbar -->
    <nav id="navbar">
        <a href="index.html">Home</a>
        <a href="#">About</a>
        <a href="#">Deals</a>
        <a href="#">Categories</a>
        <a href="#">Support</a>
        <a href="cart.html">Cart</a>
    </nav>

    <!-- Hero -->
    <div id="hero">
        <div id="hero-content">
            <h1>Next-Gen Tech,<br>Today's Prices.</h1>
            <p>Phones, laptops, accessories and more — all in one place.</p>
            <button id="hero-btn">Shop Now</button>
        </div>
        <img id="hero-image" src="shopper.webp" alt="">
    </div>

    <!-- Products -->
    <main>
        <h2 id="products-heading">Featured Products</h2>
        <section id="product-list"></section>
    </main>

    <footer>
        <p>&copy; 2024 ShopCenter. All rights reserved.</p>
    </footer>

    <script src="src/js/app.js"></script>
</body>
</html>
